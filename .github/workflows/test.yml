name: Backend CI

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -r backend/requirements.txt
      - run: |
          cd backend
          DATABASE_URL=postgresql://test_user:test_pass@localhost:5432/test_db python -c "
from app.database import engine, Base;
from app import models;
Base.metadata.create_all(bind=engine);
print('Tables created');
          "
      - run: |
          cd backend
          DATABASE_URL=postgresql://test_user:test_pass@localhost:5432/test_db uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -s http://localhost:8000/health | grep -q 'ok'
          echo 'Health check passed'
          kill %1
